name: Backend CI/CD

on:
  push:
    branches: [main, develop]

jobs:
  # ─── 1. Test（develop push 時跑）─────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew :backend:test --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/
          retention-days: 7

  # ─── 2. Merge + Deploy（測試通過後，在同一個 workflow 裡完成）─────────────
  merge-and-deploy:
    name: Merge to main & Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build fat JAR
        run: ./gradlew :backend:buildFatJar --no-daemon

      - name: Merge develop into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git merge --no-ff origin/develop -m "ci: merge develop into main"
          git push origin main

      - name: Copy artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "backend/build/libs/backend-all.jar,backend/Dockerfile,backend/docker-compose.yml"
          target: "~/justwoo"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/justwoo
            echo "🔨 Building new Docker image..."
            docker compose build backend
            echo "🚀 Restarting backend service..."
            docker compose up -d backend
            echo "🧹 Removing dangling images..."
            docker image prune -f
            echo "✅ Deploy complete"

  # ─── 3. Smoke Test（deploy 後驗證所有 API 有在回應）─────────────────────────
  smoke-test:
    name: Smoke Test
    needs: merge-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for server to be ready
        run: sleep 15

      - name: Run smoke tests
        env:
          BASE_URL: https://justwoo-tw.uk
        run: |
          fail=0

          check() {
            local desc=$1 url=$2 method=${3:-GET} body=${4:-}
            local expected_min=$5 expected_max=$6

            if [ -n "$body" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X "$method" "$url" \
                -H "Content-Type: application/json" -d "$body" --max-time 10)
            else
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X "$method" "$url" --max-time 10)
            fi

            if [ "$STATUS" -ge "$expected_min" ] && [ "$STATUS" -le "$expected_max" ]; then
              echo "✅ $desc → $STATUS"
            else
              echo "❌ $desc → $STATUS (expected $expected_min-$expected_max)"
              fail=1
            fi
          }

          # Health check
          check "GET /hello"           "$BASE_URL/hello"            GET  "" 200 200
          # Swagger docs
          check "GET /swagger"         "$BASE_URL/swagger"          GET  "" 200 200
          # Auth endpoints（空 body → 400 Bad Request，代表 endpoint 存在）
          check "POST /auth/register"  "$BASE_URL/auth/register"    POST "{}" 400 400
          check "POST /auth/login"     "$BASE_URL/auth/login"       POST "{}" 400 400
          # Protected endpoint（無 token → 401，代表 JWT middleware 正常）
          check "GET /houses (no auth)" "$BASE_URL/houses"          GET  "" 401 401

          [ $fail -eq 0 ] || (echo "💥 Smoke tests failed" && exit 1)
          echo "🎉 All smoke tests passed"
